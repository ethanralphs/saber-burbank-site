 U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{margin:0;padding:0;box-sizing:border-box}\n  :root{--bg:#f4eee9;--ink:#141210;--dark:#1d1a16;--body:#4a443b;--muted:#6a6155;--accent:#DB2525;--line:#d9cfc6}\n  html{scroll-behavior:smooth}\n  body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}\n  a{text-decoration:none;color:inherit}\n  img{max-width:100%;display:block}\n  .bebas{font-family:'Bebas Neue',sans-serif;letter-spacing:1px}\n  .pad{padding:clamp(56px,7vw,96px) clamp(24px,5vw,56px)}\n  header.nav{display:flex;align-items:center;justify-content:space-between;padding:22px clamp(24px,5vw,56px);background:var(--ink);color:var(--bg);gap:16px;flex-wrap:wrap}\n  .brand{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px}\n  .nav-right{display:flex;align-items:center;gap:clamp(16px,2.5vw,32px);font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#b3ab9c}\n  .nav-right a.link:hover{color:var(--accent)}\n  .nav-cta{background:var(--accent);color:var(--ink);padding:11px 20px;letter-spacing:1.5px;transition:background .2s}\n  .nav-cta:hover{background:var(--bg)}\n  .hero{display:grid;grid-template-columns:1.1fr .9fr}\n  .hero-left{background:var(--ink);color:var(--bg);padding:clamp(56px,6vw,90px) clamp(24px,5vw,56px);display:flex;flex-direction:column;justify-content:center}\n  .hero-left .eyebrow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:24px}\n  .hero-left h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,13vw,140px);line-height:.86;letter-spacing:1px}\n  .hero-left h1 .accent{color:var(--accent)}\n  .hero-left .lede{font-size:clamp(17px,2.2vw,19px);line-height:1.6;color:#c7bfb0;max-width:480px;margin:32px 0 38px}\n  .hero-cta{display:flex;gap:16px;flex-wrap:wrap}\n  .btn-primary{display:inline-block;background:var(--accent);color:var(--ink);padding:18px 32px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;transition:background .2s}\n  .btn-primary:hover{background:var(--bg)}\n  .btn-ghost{display:inline-block;border:1px solid #4a453d;color:var(--bg);padding:18px 30px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;transition:.2s}\n  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}\n  .hero-right{position:relative;background:repeating-linear-gradient(45deg,#e7e0d2 0 14px,#ded6c6 14px 28px);min-height:720px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:24px}\n  .hero-badge{position:absolute;top:40px;left:40px;background:var(--accent);color:var(--ink);font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:1px;width:118px;height:118px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:.85}\n  .hero-badge small{font-size:16px;font-family:'Barlow',sans-serif;font-weight:600;letter-spacing:1px}\n  .hero-right>span{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:#a79f8f}\n  .marquee{background:var(--accent);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,2vw,22px);letter-spacing:4px;padding:14px 24px;display:flex;gap:22px;justify-content:center;flex-wrap:nowrap;overflow:hidden;white-space:nowrap}\n  @media(max-width:1024px){ .marquee .s-walk{display:none} }\n  @media(max-width:860px){ .marquee .s-neck{display:none} }\n  @media(max-width:680px){ .marquee .s-towel{display:none} }\n  @media(max-width:520px){ .marquee .s-kids{display:none} }\n  .svc-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:48px;flex-wrap:wrap}\n  .svc-head h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,9vw,88px);letter-spacing:1px;line-height:.9}\n  .svc-head p{font-size:15px;color:var(--muted);max-width:320px;text-align:right}\n  .ledger{border-top:3px solid var(--ink)}\n  .price-row{display:flex;justify-content:space-between;align-items:center;padding:22px 0;border-bottom:1px solid var(--line);gap:16px}\n  .price-row .name{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,4vw,34px);letter-spacing:1px}\n  .price-row .amt{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,4vw,34px);color:var(--ink);background:var(--accent);padding:2px 16px;white-space:nowrap}\n  .price-row .amt.free{background:none;color:var(--muted);font-size:28px}\n  .price-row.last{border-bottom:3px solid var(--ink)}\n  .reviews-sec{background:var(--ink);color:var(--bg)}\n  .reviews-sec h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,76px);letter-spacing:1px;margin-bottom:48px}\n  .reviews-sec h2 .stars{color:var(--accent)}\n  .reviews{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}\n  .review{background:var(--dark);padding:34px;border-top:3px solid var(--accent)}\n  .review p{font-size:18px;line-height:1.6;color:#e2dacb;margin-bottom:22px}\n  .review .who{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--accent)}\n  .visit{display:grid;grid-template-columns:1fr 1fr}\n  .visit .info{padding:clamp(56px,6vw,90px) clamp(24px,5vw,56px);background:var(--bg)}\n  .visit .info h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,76px);letter-spacing:1px;line-height:.9;margin-bottom:8px}\n  .visit .addr{font-size:clamp(17px,2.4vw,20px);color:var(--ink);margin-bottom:6px;font-weight:600}\n  .dir-link{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1px;color:var(--ink);border-bottom:2px solid var(--accent);padding-bottom:2px}\n  .hours{margin-top:40px;border-top:3px solid var(--ink)}\n  .hours .row{display:flex;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--line);gap:16px}\n  .hours .row.last{border-bottom:0}\n  .hours .row b{font-weight:600}\n  .hours .row .t{font-family:'Space Mono',monospace}\n  .visit .mapwrap{position:relative;min-height:520px;background:#ded6c6}\n  .visit iframe{width:100%;height:100%;min-height:520px;border:0}\n  details.faq{border-top:2px solid var(--ink);padding:22px 0}\n  details.faq summary{display:flex;justify-content:space-between;align-items:center;gap:16px;font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,3.5vw,28px);letter-spacing:1px;cursor:pointer;list-style:none}\n  details.faq summary::-webkit-details-marker{display:none}\n  details.faq summary .plus{color:var(--accent);transition:transform .2s}\n  details.faq[open] summary .plus{transform:rotate(45deg)}\n  details.faq p{color:var(--body);font-size:16px;line-height:1.6;margin-top:14px;max-width:760px}\n  details.faq.last{border-bottom:2px solid var(--ink)}\n  .footer{padding:clamp(64px,8vw,100px) clamp(24px,5vw,56px);background:var(--ink);color:var(--bg);text-align:center}\n  .footer h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,11vw,96px);letter-spacing:1px;line-height:.88;margin-bottom:20px}\n  .footer h2 .accent{color:var(--accent)}\n  .footer p{font-size:clamp(16px,2vw,19px);color:#c7bfb0;margin-bottom:36px}\n  .footer .btn-primary{font-size:26px;padding:20px 44px}\n  .footer .base{margin-top:70px;padding-top:28px;border-top:1px solid #2c2822;display:flex;justify-content:space-between;gap:16px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;color:#9a927f;flex-wrap:wrap}\n  .footer .base .fb{color:var(--bg);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px}\n  @media(max-width:900px){\n    .hero{grid-template-columns:1fr}\n    .hero-right{min-height:380px;order:-1}\n    .reviews{grid-template-columns:1fr}\n    .visit{grid-template-columns:1fr}\n    .visit .mapwrap{min-height:340px;order:2}\n    .visit iframe{min-height:340px}\n  }\n  /* STICKY MOBILE CHECK-IN BAR */\n  .mobile-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--ink);padding:10px 12px;gap:10px;box-shadow:0 -8px 24px rgba(0,0,0,.35)}\n  .mobile-bar a{flex:1;display:flex;align-items:center;justif
